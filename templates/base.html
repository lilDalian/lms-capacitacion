<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS Capacitación{% endblock %} | Prácticas Operativas</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1117;
            --primary-blue: #3b82f6;
            --text-light: #e2e8f0;
            --nav-bg: rgba(15, 17, 23, 0.95);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* Navbar personalizado */
        .navbar {
            background-color: var(--nav-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .navbar-brand {
            color: var(--text-light) !important;
            font-weight: 600;
        }

        .navbar-brand i {
            color: var(--primary-blue);
            margin-right: 8px;
        }

        .nav-link {
            color: #94a3b8 !important;
            font-weight: 500;
            transition: color 0.3s ease;
            margin: 0 5px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-light) !important;
        }

        .btn-primary-custom {
            background-color: var(--primary-blue);
            border: none;
            color: white;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-primary-custom:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <i class="fa-solid fa-graduation-cap fs-4"></i>
                Prácticas Operativas
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="filter: invert(1);">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Enlaces -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'dashboard' %}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'nueva_cedula' %}">Nueva Cédula</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_practicas' %}">Prácticas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'permisos' %}">Permisos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'reporte_hh' %}">Reportes</a>
                    </li>
                </ul>
                
                <!-- Botón de acción -->
                <div class="d-flex">
                    <a href="{% url 'nueva_cedula' %}" class="btn btn-primary-custom">
                        Nueva Cédula <i class="fa-solid fa-chevron-right ms-1 fs-6"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
